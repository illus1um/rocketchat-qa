<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Demo Portal</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --panel: #fffdf8;
      --ink: #1e2430;
      --accent: #c56a2d;
      --soft: #e9dccd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #f0ddc8 0, transparent 32%),
        linear-gradient(135deg, #f7f1e7 0%, #f0e8dc 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .shell {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid #d7c8b7;
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(53, 39, 26, 0.12);
      padding: 32px;
    }

    h1 {
      margin-top: 0;
      font-size: 2.4rem;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin: 24px 0 20px;
    }

    input,
    button {
      font: inherit;
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid #c9b7a2;
    }

    button {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      cursor: pointer;
    }

    .summary {
      background: var(--soft);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 18px;
    }

    .result-card {
      border: 1px solid #eadccc;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      background: #fff;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #f2e6d7;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Search Demo Portal</h1>
    <p>Simple catalog used for Assignment 2 search automation.</p>

    <section aria-label="Search panel">
      <div class="search-row">
        <input id="search-input" name="search" type="text" placeholder="Search product, article or keyword">
        <button id="search-button" type="button">Search</button>
      </div>
      <button id="clear-button" type="button">Clear Results</button>
      <div id="summary" class="summary">Type a keyword and press Search.</div>
      <div id="results"></div>
    </section>
  </main>

  <script>
    const catalog = [
      {
        title: 'Playwright Browser Guide',
        tag: 'Testing',
        description: 'An article about reliable browser automation and assertions.'
      },
      {
        title: 'Selenium Locator Handbook',
        tag: 'Automation',
        description: 'A quick reference for CSS selectors and XPath usage.'
      },
      {
        title: 'Flight Search Best Deals',
        tag: 'Travel',
        description: 'Shows how search works for destination filtering.'
      }
    ];

    const searchInput = document.getElementById('search-input');
    const searchButton = document.getElementById('search-button');
    const clearButton = document.getElementById('clear-button');
    const results = document.getElementById('results');
    const summary = document.getElementById('summary');

    function render(items, query) {
      results.innerHTML = '';
      summary.textContent = items.length
        ? `Found ${items.length} result(s) for "${query}".`
        : `No results found for "${query}".`;

      items.forEach((item) => {
        const card = document.createElement('article');
        card.className = 'result-card';
        card.innerHTML = `
          <span class="tag">${item.tag}</span>
          <h2>${item.title}</h2>
          <p>${item.description}</p>
        `;
        results.appendChild(card);
      });
    }

    function performSearch() {
      const rawQuery = searchInput.value.trim();
      const query = rawQuery.toLowerCase();
      if (!query) {
        results.innerHTML = '';
        summary.textContent = 'Please enter a search keyword.';
        return;
      }

      const filtered = catalog.filter((item) =>
        [item.title, item.tag, item.description].some((value) =>
          value.toLowerCase().includes(query)
        )
      );
      render(filtered, rawQuery);
    }

    function clearResults() {
      searchInput.value = '';
      results.innerHTML = '';
      summary.textContent = 'Type a keyword and press Search.';
    }

    searchButton.addEventListener('click', performSearch);
    clearButton.addEventListener('click', clearResults);
    searchInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        performSearch();
      }
    });
  </script>
</body>
</html>
