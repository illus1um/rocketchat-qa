name: Rocket.Chat QA Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (Jest + Newman)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ROCKETCHAT_URL: http://localhost:3000
      RC_ADMIN_USER: ci_admin
      RC_ADMIN_PASS: AdminPass12345!

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Initialize MongoDB Replica Set
        run: |
          docker exec ${{ job.services.mongodb.id }} mongosh --quiet --eval "try { rs.initiate({_id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }]}); } catch (e) { if (e.codeName !== 'AlreadyInitialized') throw e; print('Replica set already initialized'); }"
          echo "Waiting for MongoDB replica set primary..."
          for i in {1..60}; do
            primary=$(docker exec ${{ job.services.mongodb.id }} mongosh --quiet --eval "db.hello().isWritablePrimary" | tr -d '\r')
            if [[ "$primary" == "true" ]]; then
              echo "MongoDB replica set is PRIMARY"
              break
            fi
            sleep 2
          done
          primary=$(docker exec ${{ job.services.mongodb.id }} mongosh --quiet --eval "db.hello().isWritablePrimary" | tr -d '\r')
          if [[ "$primary" != "true" ]]; then
            echo "MongoDB replica set did not become PRIMARY in time"
            docker logs ${{ job.services.mongodb.id }}
            exit 1
          fi

      - name: Start Rocket.Chat
        run: |
          docker run -d --name rocketchat \
            --network host \
            --restart unless-stopped \
            -e MONGO_URL=mongodb://localhost:27017/rocketchat?replicaSet=rs0 \
            -e MONGO_OPLOG_URL=mongodb://localhost:27017/local?replicaSet=rs0 \
            -e ROOT_URL=http://localhost:3000 \
            -e PORT=3000 \
            -e OVERWRITE_SETTING_Show_Setup_Wizard=completed \
            -e OVERWRITE_SETTING_Accounts_AllowUserRegistration=true \
            registry.rocket.chat/rocketchat/rocket.chat:latest

      - name: Wait for Rocket.Chat to be ready
        run: |
          echo "Waiting for Rocket.Chat to start..."
          timeout 180 bash -c 'until curl -sf http://localhost:3000/api/info; do echo "Waiting..."; sleep 5; done'
          echo "Rocket.Chat is ready!"

      - name: Bootstrap Rocket.Chat test user
        env:
          ROCKETCHAT_URL: ${{ env.ROCKETCHAT_URL }}
        run: |
          node <<'EOF'
          const base = process.env.ROCKETCHAT_URL;
          const username = process.env.RC_ADMIN_USER;
          const password = process.env.RC_ADMIN_PASS;
          const payload = {
            name: 'CI Admin',
            username,
            email: `${username}@example.com`,
            pass: password,
          };
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          (async () => {
            for (let attempt = 1; attempt <= 20; attempt++) {
              try {
                const response = await fetch(`${base}/api/v1/users.register`, {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify(payload),
                });
                const body = await response.text();
                if (response.ok) {
                  console.log('Test user bootstrap completed.');
                  process.exit(0);
                }
                console.log(`Attempt ${attempt} failed (${response.status}): ${body}`);
              } catch (error) {
                console.log(`Attempt ${attempt} error: ${error.message}`);
              }
              await sleep(3000);
            }
            console.error('Failed to bootstrap Rocket.Chat test user.');
            process.exit(1);
          })();
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx jest tests/api/ --verbose
        env:
          ROCKETCHAT_URL: ${{ env.ROCKETCHAT_URL }}

      - name: Run Postman/Newman tests
        run: |
          npx newman run tests/postman/rocketchat-collection.json \
            --env-var base_url=http://localhost:3000/api/v1 \
            --env-var admin_user=${RC_ADMIN_USER} \
            --env-var admin_pass=${RC_ADMIN_PASS} \
            --reporters cli,json \
            --reporter-json-export newman-results.json
        env:
          RC_ADMIN_USER: ${{ env.RC_ADMIN_USER }}
          RC_ADMIN_PASS: ${{ env.RC_ADMIN_PASS }}

      - name: Upload Newman results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: newman-results.json

      - name: Dump Rocket.Chat logs on failure
        if: failure()
        run: docker logs --tail 300 rocketchat

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      ROCKETCHAT_URL: http://localhost:3000
      RC_ADMIN_USER: ci_admin
      RC_ADMIN_PASS: AdminPass12345!

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Initialize MongoDB Replica Set
        run: |
          docker exec ${{ job.services.mongodb.id }} mongosh --quiet --eval "try { rs.initiate({_id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }]}); } catch (e) { if (e.codeName !== 'AlreadyInitialized') throw e; print('Replica set already initialized'); }"
          echo "Waiting for MongoDB replica set primary..."
          for i in {1..60}; do
            primary=$(docker exec ${{ job.services.mongodb.id }} mongosh --quiet --eval "db.hello().isWritablePrimary" | tr -d '\r')
            if [[ "$primary" == "true" ]]; then
              echo "MongoDB replica set is PRIMARY"
              break
            fi
            sleep 2
          done
          primary=$(docker exec ${{ job.services.mongodb.id }} mongosh --quiet --eval "db.hello().isWritablePrimary" | tr -d '\r')
          if [[ "$primary" != "true" ]]; then
            echo "MongoDB replica set did not become PRIMARY in time"
            docker logs ${{ job.services.mongodb.id }}
            exit 1
          fi

      - name: Start Rocket.Chat
        run: |
          docker run -d --name rocketchat \
            --network host \
            --restart unless-stopped \
            -e MONGO_URL=mongodb://localhost:27017/rocketchat?replicaSet=rs0 \
            -e MONGO_OPLOG_URL=mongodb://localhost:27017/local?replicaSet=rs0 \
            -e ROOT_URL=http://localhost:3000 \
            -e PORT=3000 \
            -e OVERWRITE_SETTING_Show_Setup_Wizard=completed \
            -e OVERWRITE_SETTING_Accounts_AllowUserRegistration=true \
            registry.rocket.chat/rocketchat/rocket.chat:latest

      - name: Wait for Rocket.Chat to be ready
        run: |
          echo "Waiting for Rocket.Chat to start..."
          timeout 180 bash -c 'until curl -sf http://localhost:3000/api/info; do echo "Waiting..."; sleep 5; done'
          echo "Rocket.Chat is ready!"

      - name: Bootstrap Rocket.Chat test user
        env:
          ROCKETCHAT_URL: ${{ env.ROCKETCHAT_URL }}
        run: |
          node <<'EOF'
          const base = process.env.ROCKETCHAT_URL;
          const username = process.env.RC_ADMIN_USER;
          const password = process.env.RC_ADMIN_PASS;
          const payload = {
            name: 'CI Admin',
            username,
            email: `${username}@example.com`,
            pass: password,
          };
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          (async () => {
            for (let attempt = 1; attempt <= 20; attempt++) {
              try {
                const response = await fetch(`${base}/api/v1/users.register`, {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify(payload),
                });
                const body = await response.text();
                if (response.ok) {
                  console.log('Test user bootstrap completed.');
                  process.exit(0);
                }
                console.log(`Attempt ${attempt} failed (${response.status}): ${body}`);
              } catch (error) {
                console.log(`Attempt ${attempt} error: ${error.message}`);
              }
              await sleep(3000);
            }
            console.error('Failed to bootstrap Rocket.Chat test user.');
            process.exit(1);
          })();
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: npx playwright test
        env:
          ROCKETCHAT_URL: ${{ env.ROCKETCHAT_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Dump Rocket.Chat logs on failure
        if: failure()
        run: docker logs --tail 300 rocketchat
