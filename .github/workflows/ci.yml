name: Rocket.Chat QA Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Rocket.Chat stack
        run: |
          docker compose up -d
          echo "Containers started:"
          docker compose ps

      - name: Wait for MongoDB to be healthy
        run: |
          echo "Waiting for MongoDB..."
          for i in $(seq 1 60); do
            if docker compose exec -T mongodb mongosh --quiet --eval "rs.status().ok" 2>/dev/null | grep -q "1"; then
              echo "MongoDB replica set is ready"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "MongoDB failed to become healthy"
              docker compose logs mongodb
              exit 1
            fi
            sleep 3
          done

      - name: Wait for Rocket.Chat to be ready
        run: |
          echo "Waiting for Rocket.Chat API..."
          for i in $(seq 1 120); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/info 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Rocket.Chat is ready (attempt $i)"
              exit 0
            fi
            if [ "$((i % 20))" = "0" ]; then
              echo "Still waiting... (attempt $i, last status: $STATUS)"
              docker compose ps
            fi
            sleep 3
          done
          echo "ERROR: Rocket.Chat failed to start within 360 seconds"
          echo "=== Container status ==="
          docker compose ps
          echo "=== Rocket.Chat logs (last 80 lines) ==="
          docker compose logs --tail=80 rocketchat
          exit 1

      - name: Verify admin login
        run: |
          BODY=$(curl -s http://localhost:3000/api/v1/login \
            -H "Content-Type: application/json" \
            -d '{"user":"admin","password":"AdminPass123!@#"}')
          SUCCESS=$(echo "$BODY" | node -e "process.stdin.on('data',d=>{try{console.log(JSON.parse(d).status)}catch(e){console.log('error')}})")
          if [ "$SUCCESS" != "success" ]; then
            echo "Admin login failed:"
            echo "$BODY"
            exit 1
          fi
          echo "Admin login OK"

      - name: Run API tests with coverage
        run: npm run test:ci -- --json --outputFile=test-results.json
        env:
          ROCKETCHAT_URL: http://localhost:3000
          RC_ADMIN_USER: admin
          RC_ADMIN_PASS: "AdminPass123!@#"

      - name: Quality Gates
        if: always()
        run: |
          echo "========================================="
          echo "       QUALITY GATE EVALUATION"
          echo "========================================="

          if [ ! -f test-results.json ]; then
            echo "No test results found — FAILED"
            exit 1
          fi

          TOTAL=$(node -e "const r=require('./test-results.json'); console.log(r.numTotalTests)")
          PASSED=$(node -e "const r=require('./test-results.json'); console.log(r.numPassedTests)")
          FAILURES=$(node -e "const r=require('./test-results.json'); console.log(r.numFailedTests)")
          SUITES_FAILED=$(node -e "const r=require('./test-results.json'); console.log(r.numFailedTestSuites)")
          PASS_RATE=$(node -e "console.log(Math.round(($PASSED/$TOTAL)*100))")

          echo ""
          echo "Results: $PASSED/$TOTAL passed, $FAILURES failed"
          echo ""

          FAILED=0

          echo -n "Gate 1 — Pass Rate >= 90%: "
          if [ "$PASS_RATE" -ge 90 ]; then echo "PASSED ($PASS_RATE%)"; else echo "FAILED ($PASS_RATE%)"; FAILED=1; fi

          echo -n "Gate 2 — Zero critical failures: "
          if [ "$FAILURES" -eq 0 ]; then echo "PASSED"; else echo "FAILED ($FAILURES failures)"; FAILED=1; fi

          echo -n "Gate 3 — All test suites pass: "
          if [ "$SUITES_FAILED" -eq 0 ]; then echo "PASSED"; else echo "FAILED ($SUITES_FAILED failed)"; FAILED=1; fi

          echo ""
          echo "========================================="
          if [ "$FAILED" -eq 1 ]; then
            echo "  QUALITY GATES: FAILED"
            exit 1
          else
            echo "  QUALITY GATES: ALL PASSED"
          fi
          echo "========================================="

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

      - name: Stop Rocket.Chat
        if: always()
        run: docker compose down -v
